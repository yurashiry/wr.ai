<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR AI — YandexGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0a2f0f, #021a05);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(50,255,80,0.08) 0%, transparent 70%);
            animation: shimmer 8s ease infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translate(0,0); opacity: 0.3; }
            50% { transform: translate(5%,5%); opacity: 0.6; }
            100% { transform: translate(0,0); opacity: 0.3; }
        }

        .glass-container {
            max-width: 900px;
            width: 100%;
            background: rgba(5, 25, 8, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(70, 255, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(60,255,80,0.2);
            overflow: hidden;
        }

        .header {
            padding: 20px 28px;
            background: rgba(0, 20, 3, 0.7);
            border-bottom: 1px solid #3a8a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5ffb6, #3bff6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: #1e4a2a;
            padding: 4px 14px;
            border-radius: 40px;
            color: #abffb5;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0a2a12aa;
            padding: 6px 16px;
            border-radius: 60px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid #4eff70;
            object-fit: cover;
        }

        .user-name {
            color: #d4ffdb;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #9effa5;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .chat-area {
            padding: 32px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .prompt-field {
            flex: 1;
            background: #0a1f0ee0;
            border: 1.5px solid #2c8a3a;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1rem;
            color: #eaffec;
            font-family: inherit;
            outline: none;
        }

        .prompt-field:focus {
            border-color: #5eff7e;
            box-shadow: 0 0 10px #3aff6e;
        }

        .send-action {
            background: linear-gradient(95deg, #0f5822, #189f3a);
            border: none;
            border-radius: 60px;
            padding: 0 32px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-action:hover:not(:disabled) {
            transform: scale(0.96);
            background: linear-gradient(95deg, #1a6e2a, #2bbf4a);
            box-shadow: 0 0 12px #47ff6e;
        }

        .send-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response-block {
            background: #061d09b3;
            border-radius: 32px;
            padding: 24px;
            border-left: 5px solid #47ff6a;
        }

        .resp-title {
            color: #b5ffc2;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .copy-code-btn {
            background: #1e4a2a;
            border: 1px solid #4eff70;
            border-radius: 40px;
            padding: 6px 16px;
            color: #abffb5;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-code-btn:hover {
            background: #2a6a3a;
            box-shadow: 0 0 8px #47ff6e;
        }

        .resp-content {
            color: #e9ffe7;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Стили для кода внутри ответа */
        .resp-content pre {
            background: #0a1a0e;
            border-radius: 16px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid #2c8a3a;
            position: relative;
        }

        .resp-content code {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #b5ffc2;
        }

        .resp-content pre code {
            display: block;
        }

        .loader {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #307a3a;
            border-top: 2px solid #8eff9a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-box {
            padding: 60px 30px;
            text-align: center;
        }

        .yandex-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #1a3a1e;
            border: 1.5px solid #4eff70;
            border-radius: 60px;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4ffdb;
            cursor: pointer;
            transition: 0.2s;
        }

        .yandex-btn:hover {
            background: #2a552e;
            transform: scale(1.02);
            box-shadow: 0 0 15px #47ff6e;
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 0.7rem;
            color: #5aa86a;
            border-top: 1px solid #2d6e3a;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e4a2a;
            color: #d4ffdb;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <div>
            <span class="logo">WR AI</span>
            <span class="badge">✦ with Alice AI ✦</span>
        </div>
        <div id="userWidget"></div>
    </div>
    <div id="dynamicContent"></div>
    <footer>🌿 переливающаяся магия WR AI с технологиями от WR. Поддеживаются все языки мира.</footer>
</div>

<script>
    // ========== ВСТАВЬТЕ ВАШИ ДАННЫЕ ==========
    const YANDEXGPT_API_KEY = "ВАШ_API_КЛЮЧ";
    const YANDEXGPT_FOLDER_ID = "ВАШ_FOLDER_ID";
    const YANDEX_CLIENT_ID = "b8f23d01e8594c39b7deac22c9f67b84";
    // ========================================
    
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const YANDEXGPT_URL = "https://llm.api.cloud.yandex.net/foundationModels/v1/completion";
    
    let loggedUser = null;
    
    const userWidget = document.getElementById('userWidget');
    const dynamicDiv = document.getElementById('dynamicContent');
    
    // Показать уведомление
    function showToast(message) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // Обработка кода в ответе и добавление кнопки копирования
    function formatResponseWithCopyButtons(text) {
        // Ищем блоки кода ```язык\nкод\n```
        const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let result = '';
        let match;
        
        while ((match = codeBlockRegex.exec(text)) !== null) {
            result += escapeHtml(text.substring(lastIndex, match.index));
            const code = match[2];
            const language = match[1] || 'code';
            const blockId = 'code_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            
            result += `
                <div style="position: relative; margin: 12px 0;">
                    <pre><code class="language-${language}" id="${blockId}">${escapeHtml(code)}</code></pre>
                    <button class="copy-code-btn" style="position: absolute; top: 8px; right: 8px;" onclick="copyCode('${blockId}')">📋 Копировать</button>
                </div>
            `;
            lastIndex = match.index + match[0].length;
        }
        result += escapeHtml(text.substring(lastIndex));
        
        // Обрабатываем строчные коды `code`
        result = result.replace(/`([^`]+)`/g, '<code style="background:#0a1a0e; padding:2px 6px; border-radius:8px;">$1</code>');
        
        return result;
    }
    
    // Функция копирования (глобальная для вызова из onclick)
    window.copyCode = function(blockId) {
        const codeElement = document.getElementById(blockId);
        if (codeElement) {
            const code = codeElement.textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('✅ Код скопирован!');
            }).catch(() => {
                showToast('❌ Не удалось скопировать');
            });
        }
    };
    
    // Запрос к YandexGPT
    async function askYandexGPT(query) {
        const requestBody = {
            modelUri: `gpt://${YANDEXGPT_FOLDER_ID}/yandexgpt-lite`,
            completionOptions: { temperature: 0.7, maxTokens: 2000 },
            messages: [{ role: "user", text: query }]
        };
        
        const response = await fetch(YANDEXGPT_URL, {
            method: "POST",
            headers: {
                "Authorization": `Api-Key ${YANDEXGPT_API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Ошибка ${response.status}: ${errorText.slice(0, 150)}`);
        }
        
        const data = await response.json();
        return data.result.alternatives[0].message.text;
    }
    
    // Сохранение/загрузка пользователя из localStorage
    function saveUserToStorage(user) {
        localStorage.setItem('wr_ai_user', JSON.stringify(user));
    }
    
    function loadUserFromStorage() {
        const saved = localStorage.getItem('wr_ai_user');
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) { return null; }
        }
        return null;
    }
    
    function clearUserStorage() {
        localStorage.removeItem('wr_ai_user');
    }
    
    // Вход через Яндекс
    function checkYandexAuth() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        
        if (token) {
            fetch('https://login.yandex.ru/info?format=json', {
                headers: { 'Authorization': `OAuth ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    loggedUser = {
                        id: data.id,
                        name: data.real_name || data.login,
                        avatar: data.default_avatar_id ? 
                            `https://avatars.yandex.net/get-yapic/${data.default_avatar_id}/islands-200` : 
                            `https://ui-avatars.com/api/?background=2d6a4f&color=fff&name=${data.login[0]}`
                    };
                    saveUserToStorage(loggedUser);
                    window.location.hash = '';
                    updateUI();
                }
            });
        } else {
            // Проверяем сохранённого пользователя
            const savedUser = loadUserFromStorage();
            if (savedUser) {
                loggedUser = savedUser;
                updateUI();
            } else {
                updateUI();
            }
        }
    }
    
    function startLogin() {
        const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${YANDEX_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
        window.location.href = url;
    }
    
    function logout() {
        loggedUser = null;
        clearUserStorage();
        updateUI();
        showToast('👋 Вы вышли из системы');
    }
    
    function renderLogin() {
        dynamicDiv.innerHTML = `
            <div class="login-box">
                <button class="yandex-btn" id="loginBtn">🔑 Войти через Яндекс ID</button>
                <p style="color: #a0e0a8; margin-top: 24px;">Авторизуйтесь, чтобы общаться с WR AI</p>
            </div>
        `;
        document.getElementById('loginBtn')?.addEventListener('click', startLogin);
    }
    
    function renderChat() {
        dynamicDiv.innerHTML = `
            <div class="chat-area">
                <div class="input-group">
                    <input type="text" class="prompt-field" id="prompt" placeholder="Спросите WR AI о чём угодно... 💚">
                    <button class="send-action" id="sendBtn">✨ Отправить</button>
                </div>
                <div class="response-block">
                    <div class="resp-title">
                        <span>🌱 WR AI отвечает</span>
                    </div>
                    <div class="resp-content" id="answer">✨ Здесь будет ответ...</div>
                </div>
            </div>
        `;
        
        const input = document.getElementById('prompt');
        const btn = document.getElementById('sendBtn');
        const answerDiv = document.getElementById('answer');
        
        async function send() {
            const query = input.value.trim();
            if (!query) return;
            
            btn.disabled = true;
            answerDiv.innerHTML = `<div class="loader"><div class="spinner"></div> WR AI думает...</div>`;
            
            try {
                const reply = await askYandexGPT(query);
                const formattedReply = formatResponseWithCopyButtons(reply);
                answerDiv.innerHTML = formattedReply;
                input.value = '';
            } catch (err) {
                answerDiv.innerHTML = `<span style="color:#ffb59e;">⚠️ Ошибка: ${escapeHtml(err.message)}</span>`;
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }
        
        btn.addEventListener('click', send);
        input.addEventListener('keypress', (e) => e.key === 'Enter' && !btn.disabled && send());
        input.focus();
    }
    
    function updateUI() {
        if (!loggedUser) {
            userWidget.innerHTML = '';
            renderLogin();
            return;
        }
        
        userWidget.innerHTML = `
            <div class="user-panel">
                <img class="avatar" src="${loggedUser.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=2e6b3e&color=fff&name=${loggedUser.name[0]}'">
                <span class="user-name">${escapeHtml(loggedUser.name)}</span>
                <button class="logout-btn" id="logoutBtn">🚪</button>
            </div>
        `;
        renderChat();
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // Запуск
    checkYandexAuth();
</script>
</body>
</html>
