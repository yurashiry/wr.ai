<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR AI — Зелёная нейросеть с Яндекс ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0a2f0f, #021a05);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(50,255,80,0.08) 0%, transparent 70%);
            animation: shimmer 8s ease infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translate(0,0); opacity: 0.3; }
            50% { transform: translate(5%,5%); opacity: 0.6; }
            100% { transform: translate(0,0); opacity: 0.3; }
        }

        .glass-container {
            max-width: 900px;
            width: 100%;
            background: rgba(5, 25, 8, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(70, 255, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(60,255,80,0.2);
            overflow: hidden;
            z-index: 2;
        }

        .header {
            padding: 20px 28px;
            background: rgba(0, 20, 3, 0.7);
            border-bottom: 1px solid #3a8a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5ffb6, #3bff6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .badge {
            background: #1e4a2a;
            padding: 4px 14px;
            border-radius: 40px;
            color: #abffb5;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0a2a12aa;
            padding: 6px 16px;
            border-radius: 60px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid #4eff70;
            object-fit: cover;
        }

        .user-name {
            color: #d4ffdb;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #9effa5;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 6px;
        }

        .chat-area {
            padding: 32px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .prompt-field {
            flex: 1;
            background: #0a1f0ee0;
            border: 1.5px solid #2c8a3a;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1rem;
            color: #eaffec;
            font-family: inherit;
            outline: none;
        }

        .prompt-field:focus {
            border-color: #5eff7e;
            box-shadow: 0 0 10px #3aff6e;
        }

        .send-action {
            background: linear-gradient(95deg, #0f5822, #189f3a);
            border: none;
            border-radius: 60px;
            padding: 0 32px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-action:hover:not(:disabled) {
            transform: scale(0.96);
            background: linear-gradient(95deg, #1a6e2a, #2bbf4a);
            box-shadow: 0 0 12px #47ff6e;
        }

        .send-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response-block {
            background: #061d09b3;
            border-radius: 32px;
            padding: 24px;
            border-left: 5px solid #47ff6a;
        }

        .resp-title {
            color: #b5ffc2;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            gap: 8px;
        }

        .resp-content {
            color: #e9ffe7;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .loader {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #307a3a;
            border-top: 2px solid #8eff9a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-box {
            padding: 60px 30px;
            text-align: center;
        }

        .yandex-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #1a3a1e;
            border: 1.5px solid #4eff70;
            border-radius: 60px;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4ffdb;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .yandex-btn:hover {
            background: #2a552e;
            transform: scale(1.02);
            box-shadow: 0 0 15px #47ff6e;
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 0.7rem;
            color: #5aa86a;
            border-top: 1px solid #2d6e3a;
        }

        .error-msg {
            color: #ffb59e;
            background: rgba(200,60,30,0.2);
            padding: 12px;
            border-radius: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="glass-container" id="appRoot">
    <div class="header">
        <div>
            <span class="logo">WR AI</span>
            <span class="badge">✦ gemini ✦</span>
        </div>
        <div id="userWidget"></div>
    </div>
    <div id="dynamicContent"></div>
    <footer>🌿 переливающаяся магия WR AI с Яндекс ID</footer>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    // API-ключ Gemini (бесплатный) — получите на https://aistudio.google.com/apikey
    const GEMINI_API_KEY = "AIzaSyBkYaXRUdapcJ2HOEWKgMarklisN4_FgSY";  // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ КЛЮЧ
    
    // ID приложения Яндекс OAuth — создайте на https://oauth.yandex.ru/
    const YANDEX_CLIENT_ID = "2bd8b4d6724842d0800a11b4f124805b";  // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ
    
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${GEMINI_API_KEY}`;
    
    let loggedUser = null; // { name, avatar, email }
    
    const userWidget = document.getElementById('userWidget');
    const dynamicDiv = document.getElementById('dynamicContent');
    
    // Проверяем URL на наличие токена после редиректа от Яндекса
    function checkYandexAuth() {
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = urlParams.get('access_token');
        
        if (accessToken) {
            // Получаем информацию о пользователе через API Яндекса
            fetch('https://login.yandex.ru/info?format=json', {
                headers: { 'Authorization': `OAuth ${accessToken}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    loggedUser = {
                        name: data.real_name || data.display_name || data.login,
                        email: data.default_email || '',
                        avatar: data.default_avatar_id ? 
                            `https://avatars.yandex.net/get-yapic/${data.default_avatar_id}/islands-200` : 
                            `https://ui-avatars.com/api/?background=2d6a4f&color=fff&name=${(data.first_name?.[0] || 'W')}`
                    };
                    // Очищаем URL от токена
                    window.location.hash = '';
                    updateUI();
                }
            })
            .catch(err => {
                console.error('Ошибка получения данных пользователя:', err);
                dynamicDiv.innerHTML += '<div class="error-msg">❌ Не удалось получить данные пользователя</div>';
            });
        }
    }
    
    function startYandexLogin() {
        const authUrl = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${YANDEX_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
        window.location.href = authUrl;
    }
    
    function renderLogin() {
        dynamicDiv.innerHTML = `
            <div class="login-box">
                <button class="yandex-btn" id="yandexLoginBtn">
                    <span>🔑</span> Войти через Яндекс ID
                </button>
                <p style="color: #a0e0a8; margin-top: 24px; font-size: 0.85rem;">🔐 Авторизуйтесь, чтобы общаться с WR AI</p>
            </div>
        `;
        document.getElementById('yandexLoginBtn')?.addEventListener('click', startYandexLogin);
    }
    
    function renderChat() {
        dynamicDiv.innerHTML = `
            <div class="chat-area">
                <div class="input-group">
                    <input type="text" class="prompt-field" id="wrPrompt" placeholder="Спроси WR AI о чём угодно... 💚" autocomplete="off">
                    <button class="send-action" id="wrSendBtn">✨ Отправить</button>
                </div>
                <div class="response-block">
                    <div class="resp-title">
                        <span>🌱 WR AI отвечает</span>
                    </div>
                    <div class="resp-content" id="answerArea">✨ Здесь будет зелёный ответ...</div>
                </div>
            </div>
        `;
    
        const inputField = document.getElementById('wrPrompt');
        const sendButton = document.getElementById('wrSendBtn');
        const answerDiv = document.getElementById('answerArea');
    
        async function askGemini() {
            const query = inputField.value.trim();
            if (!query) {
                answerDiv.innerHTML = "🌿 Напишите что-нибудь...";
                return;
            }
            sendButton.disabled = true;
            answerDiv.innerHTML = `<div class="loader"><div class="spinner"></div> WR AI размышляет под зелёным сиянием...</div>`;
    
            try {
                const payload = {
                    contents: [{
                        parts: [{ text: query }],
                        role: "user"
                    }]
                };
    
                const response = await fetch(GEMINI_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
    
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API error ${response.status}: ${errText.slice(0, 150)}`);
                }
    
                const data = await response.json();
                const geminiReply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "❌ Не удалось получить ответ от нейросети.";
                answerDiv.innerHTML = escapeHtml(geminiReply);
                inputField.value = '';
            } catch (err) {
                console.error(err);
                answerDiv.innerHTML = `<span style="color:#ffb59e;">⚠️ Ошибка: ${escapeHtml(err.message)}<br> Проверьте API-ключ Gemini.</span>`;
            } finally {
                sendButton.disabled = false;
                inputField.focus();
            }
        }
    
        sendButton.addEventListener('click', askGemini);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                askGemini();
            }
        });
        inputField.focus();
    }
    
    function updateUI() {
        if (!loggedUser) {
            userWidget.innerHTML = '';
            renderLogin();
            return;
        }
        
        userWidget.innerHTML = `
            <div class="user-panel">
                <img class="avatar" src="${loggedUser.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=2e6b3e&color=fff&name=${loggedUser.name[0]}'">
                <span class="user-name">${escapeHtml(loggedUser.name)}</span>
                <button class="logout-btn" id="doLogoutBtn">🚪</button>
            </div>
        `;
        renderChat();
        document.getElementById('doLogoutBtn')?.addEventListener('click', () => {
            loggedUser = null;
            updateUI();
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Запуск
    checkYandexAuth();
    updateUI();
</script>
</body>
</html>
